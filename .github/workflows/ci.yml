name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ FIXED LOGIN
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/poc20:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/poc20:${{ github.sha }}

      # ✅ IMPORTANT (GitOps trigger)
      - name: Update Kustomize Image
        run: |
          sed -i 's|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/poc20:${{ github.sha }}|' kustomize/base/deployment.yaml

      # ✅ FIXED GIT AUTH
      - name: Setup Git Auth
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      # ✅ SAFE COMMIT
      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Update image tag"
          git push
